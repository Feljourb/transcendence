<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillSwap Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SkillSwap API Tester</h1>
        
        <div id="auth-section">
            <form id="register-form">
                <h3>Register</h3>
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <input type="email" id="reg-email" placeholder="Email">
                <div style="margin: 10px 0; padding: 10px; border: 1px dashed #ccc; border-radius: 5px;">
                    <label style="display: block; margin-bottom: 5px;">Skills:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="reg-skill-input" placeholder="e.g. Python, Docker" style="margin: 0; width: 70%;">
                        <button type="button" id="add-skill-btn" style="margin: 0; width: 30%; background: #28a745;">Add Skill</button>
                    </div>
                    <div id="reg-skills-list" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px;"></div>
                </div>
                <button type="submit">Register</button>
            </form>

            <form id="login-form">
                <h3>Login</h3>
                <input type="text" id="log-username" placeholder="Username" required>
                <input type="password" id="log-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <div id="profile-section" style="display: none;">
            <button id="logout-btn">Logout</button>
            
            <div id="profile-display">
                <h3>Your Profile</h3>
                <img id="avatar-img" src="" alt="Avatar" style="max-width: 150px; display: none;">
                <p><strong>Username:</strong> <span id="p-username"></span></p>
                <p><strong>Email:</strong> <span id="p-email"></span></p>
                <p><strong>Location:</strong> <span id="p-location"></span></p>
                <p><strong>Bio:</strong> <span id="p-bio"></span></p>
                <p><strong>Skills:</strong> <span id="p-skills"></span></p>
            </div>

            <form id="update-profile-form">
                <h3>Update Profile</h3>
                <input type="text" id="up-location" placeholder="New Location">
                <textarea id="up-bio" placeholder="New Bio"></textarea>
                <button type="submit">Update Info</button>
            </form>

            <form id="avatar-form">
                <h3>Update Avatar</h3>
                <input type="file" id="up-avatar" accept="image/*" required>
                <button type="submit">Upload Avatar</button>
            </form>

             <hr>
            <h3>Find Users</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search-username" placeholder="Type a username..." style="width: 70%;">
                <button id="search-btn" style="width: 30%;">Search</button>
            </div>

            <div id="public-profile-display" style="display: none; background: #e9ecef; padding: 15px; margin-top: 15px; border-radius: 5px;">
                <h4 style="margin-top: 0;">User Profile</h4>
                <img id="pub-avatar-img" src="" alt="Avatar" style="max-width: 100px; display: none; border-radius: 50%;">
                <p><strong>Username:</strong> <span id="pub-username"></span></p>
                <p><strong>Bio:</strong> <span id="pub-bio"></span></p>
                <p><strong>Location:</strong> <span id="pub-location"></span></p>
                <p><strong>Skills:</strong> <span id="pub-skills"></span></p>
            </div>
            <hr>
            <h3>Friends & Network</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="skill-search-input" placeholder="Search users by skill (e.g. python)" style="width: 70%;">
                <button id="skill-search-btn" style="width: 30%;">Search Skill</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="friend-search-input" placeholder="Filter your friends by username" style="width: 70%;">
                <button id="friend-search-btn" style="width: 30%;">My Friends</button>
            </div>

            <div id="network-results" style="background: #e9ecef; padding: 15px; border-radius: 5px; display: none; margin-top: 15px;">
                <h4 style="margin-top: 0;" id="network-title">Results</h4>
                <div id="network-list"></div>
            </div>
        </div>
        <div id="message"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
